<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoDrop - Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts & Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body class="auth-body">

<div class="auth-container">

    <!-- Logo Section -->
    <div class="auth-logo">
        <div class="logo-box">
            <img src="../assets/images/logo.png" class="logo-img" alt="EcoDrop Logo">
            <span class="logo-text">EcoDrop</span>
        </div>

        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your EcoDrop account</p>
    </div>

    <!-- Login Card -->
    <div class="auth-card">

        <form id="loginForm">

            <!-- Error Message -->
            <div id="errorMsg" class="hidden error-box"></div>

            <!-- Email -->
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" required placeholder="Enter your password">
                    <span id="togglePassword"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            <!-- Remember -->
            <div class="remember-row">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>

            <!-- Button -->
            <button type="submit" id="loginBtn" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>or continue with</span>
            </div>

            <!-- Social -->
            <div class="social-row">
                <button type="button" class="social-btn">
                    <i class="fab fa-google"></i>
                    Google
                </button>

                <button type="button" class="social-btn">
                    <i class="fab fa-apple"></i>
                    Apple
                </button>
            </div>

            <!-- Register -->
            <div class="bottom-link">
                <p>Don't have an account?</p>
                <a href="signup.html">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </a>
            </div>

        </form>
    </div>

    <p class="footer-text">© 2026 EcoDrop. Where Waste Becomes Worth — Measured & Managed.</p>

</div>

<script src="../assets/js/login.js"></script>
</body>
</html>
